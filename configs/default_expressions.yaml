# Dreamer — Expression & Lighting Presets
# Edit these to customize your generation prompts.

expressions:
  gentle_smile:
    prompt: "with a gentle, warm smile, soft expression"
    description: "Subtle, approachable smile — works well for professional headshots"

  confident:
    prompt: "with a confident expression, slight smile, strong gaze"
    description: "Assertive look, useful for business/LinkedIn portraits"

  neutral:
    prompt: "with a neutral, relaxed expression, calm eyes"
    description: "Clean baseline — closest to a passport-style expression"

  relaxed:
    prompt: "with a relaxed, natural expression, soft eyes"
    description: "Candid, off-guard feel"

  thoughtful:
    prompt: "looking thoughtful, slight contemplative expression"
    description: "Intellectual, introspective mood"

  joyful:
    prompt: "with a bright joyful smile, eyes slightly squinted with happiness"
    description: "Full genuine smile — Duchenne smile"

  serene:
    prompt: "with a serene, peaceful expression, soft gaze"
    description: "Calm and composed — good for wellness/meditation contexts"

  engaged:
    prompt: "with a curious, engaged expression, eyebrows slightly raised"
    description: "Interested, attentive look"

  knowing:
    prompt: "with a subtle, knowing smile, confident eyes"
    description: "Slightly mysterious, charismatic"

  composed:
    prompt: "with a calm, composed expression, direct gaze"
    description: "Professional and authoritative"


lighting_presets:
  studio:
    prompt: "studio lighting, soft box, even illumination"

  natural:
    prompt: "natural window light, soft shadows, warm tone"

  golden_hour:
    prompt: "golden hour sunlight, warm orange glow, soft rim light"

  dramatic:
    prompt: "dramatic Rembrandt lighting, single key light, deep shadows"

  overcast:
    prompt: "overcast outdoor lighting, diffuse soft light, cool tones"

  backlit:
    prompt: "backlit with soft rim light, slight glow around hair"


base_quality_suffix: >
  sharp focus, photorealistic, high quality skin texture,
  detailed eyes, natural colors, 85mm lens, f/2.8,
  professional photography


negative_prompt: >
  deformed, distorted, disfigured, bad anatomy, blurry,
  low quality, watermark, signature, extra limbs, missing features,
  ugly, cartoon, painting, illustration, CGI, 3D render,
  overexposed, underexposed, grainy, pixelated
